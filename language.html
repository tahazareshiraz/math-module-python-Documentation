<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Selection</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Tahoma, Arial, sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: min(420px, calc(100vw - 32px));
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .title {
      font-size: 1.25rem;
      margin: 0 0 8px;
    }
    .subtitle {
      font-size: 1rem;
      color: #4b5563;
      margin: 0 0 20px;
      direction: ltr;
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      min-width: 120px;
      font-size: 1rem;
      cursor: pointer;
      background: #0f766e;
      color: #ffffff;
    }
    button.secondary {
      background: #111827;
    }
    button:hover {
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">زبان خود را انتخاب کنید</p>
    <p class="subtitle">Choose your language</p>
    <div class="buttons">
      <button id="faBtn" type="button">فارسی</button>
      <button id="enBtn" class="secondary" type="button">English</button>
    </div>
  </div>

  <script>
    document.getElementById('faBtn').addEventListener('click', function () {
      window.location.href = 'document.html';
    });

    document.getElementById('enBtn').addEventListener('click', function () {
      window.location.href = 'document_english.html';
    });
  </script>
</body>
</html>

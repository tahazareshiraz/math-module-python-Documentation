<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Selection</title>
  <style>
    :root{
      --bg1:#07111f;
      --bg2:#0f172a;
      --card:rgba(255,255,255,.92);
      --line:rgba(148,163,184,.28);
      --text:#0f172a;
      --muted:#475569;
      --accent:#0f766e;
      --accent-strong:#115e59;
      --shadow:0 26px 60px rgba(2, 6, 23, 0.24);
    }
    *{box-sizing:border-box}
    html{
      width:100%;
      height:100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(45, 212, 191, 0.18), transparent 26%),
        radial-gradient(circle at 80% 25%, rgba(59, 130, 246, 0.18), transparent 24%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Tahoma, Arial, sans-serif;
      color: var(--text);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before, body::after{
      content:"";
      position:fixed;
      inset:auto;
      border-radius:999px;
      pointer-events:none;
      filter:blur(0);
      animation:float 12s ease-in-out infinite;
    }
    body::before{
      width:260px;height:260px;
      left:-70px;top:-50px;
      background:rgba(45, 212, 191, 0.12);
    }
    body::after{
      width:340px;height:340px;
      right:-120px;bottom:-100px;
      background:rgba(59, 130, 246, 0.10);
      animation-delay:-6s;
    }
    .card {
      width: min(420px, calc(100vw - 32px));
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 30px 24px 26px;
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      transform: translateY(0);
      animation: cardIn .75s cubic-bezier(.2,.9,.2,1) both;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,.5) 45%, transparent 60%);
      transform: translateX(-120%);
      animation: sheen 5.5s ease-in-out infinite;
      pointer-events:none;
    }
    .title {
      font-size: 1.35rem;
      margin: 0 0 10px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      margin: 0 0 20px;
      direction: ltr;
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      min-width: 120px;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(180deg, #11998e, var(--accent));
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.24);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }
    button.secondary {
      background: linear-gradient(180deg, #1f2937, #0f172a);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(15, 118, 110, 0.3);
      filter: brightness(1.02);
    }
    button:active{
      transform: translateY(0);
    }
    @keyframes cardIn{
      from{opacity:0;transform:translateY(18px) scale(.98)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes float{
      0%,100%{transform:translateY(0) translateX(0)}
      50%{transform:translateY(-12px) translateX(8px)}
    }
    @keyframes sheen{
      0%, 64%{transform:translateX(-120%)}
      100%{transform:translateX(120%)}
    }
    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation-duration:0.01ms !important;
        animation-iteration-count:1 !important;
        transition-duration:0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">زبان خود را انتخاب کنید</p>
    <p class="subtitle">Choose your language</p>
    <div class="buttons">
      <button id="faBtn" type="button">فارسی</button>
      <button id="enBtn" class="secondary" type="button">English</button>
    </div>
  </div>

  <script>
    document.getElementById('faBtn').addEventListener('click', function () {
      window.location.href = 'document.html';
    });

    document.getElementById('enBtn').addEventListener('click', function () {
      window.location.href = 'document_english.html';
    });
  </script>
</body>
</html>
